name: wildsnap_pro
description: WildSnap Pro - A production-grade Flutter application for detecting animals and birds from images and bird sounds.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Local Storage (Offline-First)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # ML/TensorFlow Lite
  tflite_flutter: ^0.10.4
  
  # Audio Recording
  flutter_sound: ^9.2.13
  permission_handler: ^11.1.0
  
  # Image Processing
  image_picker: ^1.0.5
  image: ^4.1.3
  
  # Share Feature
  share_plus: ^7.2.1
  screenshot: ^2.1.0
  path_provider: ^2.1.1
  
  # Network (for optional sync)
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Utils
  dartz: ^0.10.1
  equatable: ^2.0.5
  uuid: ^4.2.2
  intl: ^0.18.1
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/labels/
    - assets/species_data/
    - assets/images/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
